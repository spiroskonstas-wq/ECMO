<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECMO Management & Calculations</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel for standalone execution -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: sans-serif; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        .tab-active { background-color: #2563eb; color: white; }
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        /* Smooth scrolling for the main container */
        .scroll-smooth-container {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        // --- Custom Icon Component ---
        const Icon = ({ name, className = "w-5 h-5" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        // --- Shared UI Components ---
        const Card = ({ children, className = "" }) => (
            <div className={`bg-slate-800 rounded-xl border border-slate-700 shadow-lg overflow-hidden ${className}`}>
                {children}
            </div>
        );

        const SectionHeader = ({ title, iconName }) => (
            <div className="flex items-center gap-2 mb-4 border-b border-slate-700 pb-2">
                <Icon name={iconName} className="text-blue-400 w-5 h-5" />
                <h2 className="text-xl font-semibold text-slate-100">{title}</h2>
            </div>
        );

        const InputField = ({ label, value, onChange, unit, step = "0.1", min = "0", placeholder }) => (
            <div className="flex flex-col gap-1 mb-3">
                <label className="text-xs font-medium text-slate-400 uppercase tracking-wider">{label}</label>
                <div className="relative">
                    <input
                        type="text"
                        inputMode="decimal"
                        value={value}
                        placeholder={placeholder}
                        onChange={(e) => {
                            const val = e.target.value;
                            if (val === '') {
                                onChange('');
                                return;
                            }
                            if (/^\d*\.?\d*$/.test(val)) {
                                onChange(val);
                            }
                        }}
                        className="w-full bg-slate-900 border border-slate-700 rounded-lg py-2 pl-3 pr-14 text-slate-100 placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all"
                    />
                    <span className="absolute right-3 top-2 text-[10px] text-slate-500 font-bold">{unit}</span>
                </div>
            </div>
        );

        const AlertBox = ({ type = 'info', title, message, action }) => {
            const colors = {
                info: 'bg-blue-500/10 border-blue-500/50 text-blue-400',
                warning: 'bg-yellow-500/10 border-yellow-500/50 text-yellow-400',
                danger: 'bg-red-500/10 border-red-500/50 text-red-400',
                success: 'bg-green-500/10 border-green-500/50 text-green-400'
            };

            return (
                <div className={`p-4 rounded-lg border ${colors[type]} mb-4 flex gap-3 items-start`}>
                    <Icon name={type === 'danger' ? 'alert-octagon' : 'alert-circle'} className="w-5 h-5 shrink-0 mt-0.5" />
                    <div className="flex-1">
                        {title && <h4 className="font-bold text-sm mb-1 uppercase tracking-tight">{title}</h4>}
                        <p className="text-sm opacity-90 leading-relaxed">{message}</p>
                        {action && <p className="mt-2 font-bold text-xs uppercase underline">{action}</p>}
                    </div>
                </div>
            );
        };

        // --- Main App Component ---
        function App() {
            const [activeTab, setActiveTab] = useState('ECMO');
            const mainRef = useRef(null);

            // Initializing with empty strings to show greyed out placeholders
            const [data, setData] = useState({
                weight: '', map: '', hr: '', cvp: '', pulsePressure: '',
                mode: 'VA', flow: '', sweep: '', fio2: '', rpm: '',
                ph: '', pco2: '', po2: '', lactate: '', hb: '',
                plt: '', fibrinogen: '', inr: '', aptt: '', antiXa: '',
                svo2: '', arterialSaturation: '', venousSaturation: '',
                act: ''
            });

            const updateData = (key, value) => setData(prev => ({ ...prev, [key]: value }));

            const scrollToTop = () => {
                if (mainRef.current) {
                    mainRef.current.scrollTo({ top: 0, behavior: 'smooth' });
                }
            };

            const navItems = [
                { id: 'ECMO', label: 'Inputs & Labs', icon: 'settings' },
                { id: 'va', label: 'VA Algorithm', icon: 'activity' },
                { id: 'vv', label: 'VV Algorithm', icon: 'wind' },
                { id: 'gas', label: 'Gas Exchange', icon: 'zap' },
                { id: 'hemo', label: 'Hemodynamics', icon: 'heart' },
                { id: 'transfusion', label: 'Transfusion', icon: 'droplets' },
                { id: 'anticoagulation', label: 'Anticoagulation', icon: 'shield-check' },
            ];

            const calculations = useMemo(() => {
                const isValid = (val) => val !== '' && !isNaN(parseFloat(val));
                
                const targetPCO2 = 40;
                let sweepAdjustment = "--";
                if (isValid(data.pco2) && isValid(data.sweep)) {
                    sweepAdjustment = ((parseFloat(data.pco2) * parseFloat(data.sweep)) / targetPCO2).toFixed(1);
                }
                
                let cao2 = "--";
                if (isValid(data.hb) && isValid(data.arterialSaturation) && isValid(data.po2)) {
                    cao2 = (parseFloat(data.hb)/10 * 1.34 * (parseFloat(data.arterialSaturation) / 100) + (parseFloat(data.po2) * 0.0031)).toFixed(1);
                }

                let bsa = "--";
                let flowIndex = "--";
                if (isValid(data.weight)) {
                    bsa = Math.sqrt((170 * parseFloat(data.weight)) / 3600);
                    if (isValid(data.flow)) {
                        flowIndex = (parseFloat(data.flow) / bsa).toFixed(1);
                    }
                }

                return { sweepAdjustment, cao2, bsa, flowIndex };
            }, [data]);

            const BackToTopButton = () => (
                <button 
                    onClick={scrollToTop}
                    className="mt-8 mb-4 w-full py-3 bg-slate-900 border border-slate-800 rounded-xl flex items-center justify-center gap-2 text-slate-400 hover:text-white hover:bg-slate-800 transition-all active:scale-95"
                >
                    <Icon name="chevron-up" className="w-4 h-4" />
                    <span className="text-xs font-bold uppercase tracking-widest">Back to Top</span>
                </button>
            );

            const Overview = () => (
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <Card className="p-5">
                        <SectionHeader title="Patient & Vitals" iconName="user" />
                        <InputField label="Weight" value={data.weight} onChange={(v) => updateData('weight', v)} unit="kg" placeholder="75" />
                        <InputField label="Mean Art Press (MAP)" value={data.map} onChange={(v) => updateData('map', v)} unit="mmHg" step="1" placeholder="65" />
                        <InputField label="CVP" value={data.cvp} onChange={(v) => updateData('cvp', v)} unit="mmHg" step="1" placeholder="10" />
                        <InputField label="Pulse Pressure" value={data.pulsePressure} onChange={(v) => updateData('pulsePressure', v)} unit="mmHg" step="1" placeholder="25" />
                    </Card>
                    <Card className="p-5">
                        <SectionHeader title="ECMO Console" iconName="monitor" />
                        <div className="mb-4">
                            <label className="text-xs font-medium text-slate-400 mb-1 block">MODALITY</label>
                            <div className="flex bg-slate-900 rounded-lg p-1">
                                {['VA', 'VV'].map(mode => (
                                    <button
                                        key={mode}
                                        onClick={() => updateData('mode', mode)}
                                        className={`flex-1 py-1.5 text-xs font-bold rounded-md transition-all ${
                                            data.mode === mode ? 'bg-blue-600 text-white' : 'text-slate-400 hover:text-slate-200'
                                        }`}
                                    >
                                        {mode} ECMO
                                    </button>
                                ))}
                            </div>
                        </div>
                        <InputField label="Blood Flow" value={data.flow} onChange={(v) => updateData('flow', v)} unit="L/min" placeholder="4.0" />
                        <InputField label="Sweep Gas" value={data.sweep} onChange={(v) => updateData('sweep', v)} unit="L/min" placeholder="3.5" />
                        <InputField label="FiO2" value={data.fio2} onChange={(v) => updateData('fio2', v)} unit="%" step="1" placeholder="100" />
                    </Card>
                    <Card className="p-5">
                        <SectionHeader title="Clinical Labs" iconName="flask-conical" />
                        <div className="grid grid-cols-2 gap-x-4">
                            <InputField label="pH" value={data.ph} onChange={(v) => updateData('ph', v)} unit="" step="0.01" placeholder="7.35" />
                            <InputField label="pCO2" value={data.pco2} onChange={(v) => updateData('pco2', v)} unit="mmHg" placeholder="40" />
                            <InputField label="pO2" value={data.po2} onChange={(v) => updateData('po2', v)} unit="mmHg" placeholder="90" />
                            <InputField label="Lactate" value={data.lactate} onChange={(v) => updateData('lactate', v)} unit="mmol/L" placeholder="1.5" />
                            <InputField label="Hemoglobin" value={data.hb} onChange={(v) => updateData('hb', v)} unit="g/L" step="1" placeholder="85" />
                            <InputField label="Platelets" value={data.plt} onChange={(v) => updateData('plt', v)} unit="10^9/L" step="1" placeholder="150" />
                            <InputField label="SvO2" value={data.svo2} onChange={(v) => updateData('svo2', v)} unit="%" placeholder="70" />
                            <InputField label="SpO2 / SaO2" value={data.arterialSaturation} onChange={(v) => updateData('arterialSaturation', v)} unit="%" placeholder="98" />
                        </div>
                    </Card>
                </div>
            );

            const VAProtocol = () => {
                const hasValue = (val) => val !== '';
                return (
                <div className="space-y-6">
                    <Card className="p-5 border-l-4 border-l-red-500">
                        <SectionHeader title="VA Cardiac Algorithm" iconName="activity" />
                        <div className="space-y-4">
                            {!hasValue(data.map) && !hasValue(data.svo2) && !hasValue(data.pulsePressure) && !hasValue(data.lactate) && (
                                <p className="text-slate-500 text-sm italic">Enter vitals and labs in "Inputs" to see algorithmic analysis.</p>
                            )}

                            {hasValue(data.map) && (parseFloat(data.map) < 60 ? (
                                <AlertBox type="danger" title="Hypotension" message="MAP < 60 mmHg. Evaluate circuit flow vs. vasoplegia." action="Action: Increase Flow or start Noradrenaline." />
                            ) : (
                                <AlertBox type="success" title="MAP Stable" message="Perfusion pressure adequate." />
                            ))}

                            {hasValue(data.svo2) && (parseFloat(data.svo2) < 60 ? (
                                <AlertBox type="danger" title="Low Cardiac Output" message={`SvO2 is ${data.svo2}%. Systemic delivery is not meeting demand.`} action="Action: Increase ECMO Flow, Check Hb, or consider Inotropes." />
                            ) : parseFloat(data.svo2) > 80 ? (
                                <AlertBox type="info" title="High SvO2" message="High SvO2 suggests luxury perfusion or vaspolegia. Consider weaning flow if stable." />
                            ) : null)}

                            {hasValue(data.pulsePressure) && (parseFloat(data.pulsePressure) < 10 ? (
                                <AlertBox type="warning" title="LV Distension Risk" message="Pulse pressure < 10 mmHg indicates poor aortic valve opening." action="Action: Reduce Flow slightly (if tolerable) OR start Dobutamine OR consider LV Vent." />
                            ) : (
                                <AlertBox type="info" title="LV Unloading" message="Adequate pulsatility maintained." />
                            ))}

                            {hasValue(data.lactate) && parseFloat(data.lactate) > 2.0 && (
                                <AlertBox type="danger" title="Inadequate Flow" message="Lactate rising. Flow may be insufficient for metabolic demand." action="Action: Increase RPM to target higher Cardiac Index." />
                            ) }
                        </div>
                    </Card>
                    <Card className="p-5 bg-slate-900">
                        <h3 className="text-sm font-bold text-blue-400 mb-2 uppercase">Differential Hypoxia (Harlequin)</h3>
                        <p className="text-sm text-slate-300">If femoral artery return is used, upper body may receive deoxygenated blood from failing heart.</p>
                        <div className="mt-4 grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div className="p-3 bg-slate-800 rounded border border-slate-700">
                                <p className="text-xs text-slate-400">Right Radial SaO2 / SpO2</p>
                                {!hasValue(data.arterialSaturation) ? (
                                    <p className="text-slate-500 text-sm italic">Awaiting input...</p>
                                ) : parseFloat(data.arterialSaturation) < 90 ? (
                                    <>
                                        <p className="text-red-400 font-bold">Harlequin Syndrome detected ({data.arterialSaturation}%)</p>
                                        <p className="text-[10px] mt-1 italic">Action: Increase Sweep FiO2, consider V-A-V conversion or repositioning return cannula.</p>
                                    </>
                                ) : (
                                    <p className="text-green-400 font-bold">Upper Body Saturations Adequate ({data.arterialSaturation}%)</p>
                                )}
                            </div>
                        </div>
                    </Card>
                </div>
            )};

            const VVProtocol = () => {
                const hasValue = (val) => val !== '';
                return (
                <div className="space-y-6">
                    <Card className="p-5 border-l-4 border-l-blue-500">
                        <SectionHeader title="VV Respiratory Algorithm" iconName="wind" />
                        <div className="space-y-4">
                            {!hasValue(data.arterialSaturation) && !hasValue(data.svo2) && (
                                <p className="text-slate-500 text-sm italic">Enter arterial saturation and SvO2 in "Inputs" to see analysis.</p>
                            )}

                            {hasValue(data.arterialSaturation) && (parseFloat(data.arterialSaturation) < 85 ? (
                                <AlertBox type="danger" title="Refractory Hypoxemia" message={`SaO2 is ${data.arterialSaturation}%. Critical threshold for VV ECMO.`} action="Step 1: Increase Blood Flow to max. Step 2: Check for Recirculation. Step 3: Optimize native lung PEEP." />
                            ) : (
                                <AlertBox type="success" title="Oxygenation Target Met" message={`SaO2 ${data.arterialSaturation}% is acceptable in VV ECMO (Target >88%).`} />
                            ))}
                            
                            {hasValue(data.svo2) && hasValue(data.arterialSaturation) && parseFloat(data.svo2) > 85 && (
                                <AlertBox type="warning" title="Recirculation Suspected" message={`High SvO2 (${data.svo2}%) relative to SaO2 (${data.arterialSaturation}%) often indicates recirculation.`} action="Action: Physically separate cannulae or slightly reduce Flow." />
                            )}

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div className="p-4 bg-slate-900 rounded-lg">
                                    <h4 className="text-xs font-bold text-slate-400 uppercase mb-2">Recirculation Check</h4>
                                    <p className="text-sm">If Pre-Oxygenator Saturation (Sveo2) is > 75%, suspect high recirculation.</p>
                                    <p className="text-xs text-blue-400 mt-2">Solution: Reposition cannulae or reduce flow slightly.</p>
                                </div>
                                <div className="p-4 bg-slate-900 rounded-lg">
                                    <h4 className="text-xs font-bold text-slate-400 uppercase mb-2">Lung Rest Settings</h4>
                                    <ul className="text-xs space-y-1 text-slate-300">
                                        <li>• Tidal Volume: 4 mL/kg (PBW)</li>
                                        <li>• Plateau Pressure: &lt; 25 cmH2O</li>
                                        <li>• PEEP: 10-15 cmH2O</li>
                                        <li>• Rate: 10 bpm</li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </Card>
                </div>
            )};

            const GasExchange = () => (
                <div className="space-y-6">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <Card className="p-5">
                            <SectionHeader title="Ventilation Management" iconName="chevrons-up" />
                            <div className="bg-slate-900 p-4 rounded-lg mb-4">
                                <p className="text-xs text-slate-400 uppercase">Target pCO2: 40 mmHg</p>
                                <p className="text-3xl font-mono text-blue-400 mt-1">{calculations.sweepAdjustment} <span className="text-sm">L/min</span></p>
                                <p className="text-[10px] text-slate-500 mt-2 italic">Calculated based on current pCO2 of {data.pco2 || "--"} mmHg and Sweep of {data.sweep || "--"} L/min.</p>
                            </div>
                            <AlertBox type="warning" message="Avoid rapid CO2 clearance in chronic hypercapnia to prevent cerebral edema." />
                        </Card>
                        <Card className="p-5">
                            <SectionHeader title="Oxygenation Logic" iconName="droplet" />
                            <div className="space-y-3">
                                <div className="flex justify-between text-sm border-b border-slate-700 pb-1">
                                    <span className="text-slate-400">Calculated CaO2:</span>
                                    <span className="font-bold">{calculations.cao2} mL/dL</span>
                                </div>
                                <p className="text-xs text-slate-300">Oxygen delivery (DO2) is primarily driven by Blood Flow (L/min) and Hb, not Sweep FiO2.</p>
                                {data.po2 !== '' && parseFloat(data.po2) > 150 ? (
                                    <AlertBox type="info" message="Hyperoxia detected. Wean Sweep FiO2 to prevent oxidative stress." />
                                ) : null}
                            </div>
                        </Card>
                    </div>
                </div>
            );

            const Hemodynamics = () => (
                <div className="space-y-6">
                    <Card className="p-5">
                        <SectionHeader title="Circulation & Access" iconName="refresh-cw" />
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                            <div className="bg-slate-900 p-4 rounded-lg text-center">
                                <p className="text-[10px] text-slate-500 font-bold uppercase">Cardiac Index (ECMO)</p>
                                <p className="text-2xl font-mono text-white">{calculations.flowIndex}</p>
                                <p className="text-[10px] text-slate-400">L/min/m²</p>
                            </div>
                            <div className="bg-slate-900 p-4 rounded-lg text-center">
                                <p className="text-[10px] text-slate-500 font-bold uppercase">Total SVR (Est)</p>
                                <p className="text-2xl font-mono text-white">
                                    { (data.map !== '' && data.cvp !== '' && data.flow !== '' && parseFloat(data.flow) > 0) 
                                      ? ((parseFloat(data.map) - parseFloat(data.cvp)) / parseFloat(data.flow) * 80).toFixed(0) 
                                      : "--" }
                                </p>
                                <p className="text-[10px] text-slate-400">dynes·sec/cm⁵</p>
                            </div>
                            <div className="bg-slate-900 p-4 rounded-lg text-center">
                                <p className="text-[10px] text-slate-500 font-bold uppercase">Venous Sat (SvO2)</p>
                                <p className="text-2xl font-mono text-blue-400">{data.svo2 || "--"}%</p>
                                <p className="text-[10px] text-slate-400">Systemic extraction</p>
                            </div>
                        </div>
                        <h4 className="font-bold text-sm mb-2 text-slate-200 uppercase">Troubleshooting Chatters / Suction</h4>
                        <div className="bg-slate-900 p-3 rounded-lg border border-red-900/30">
                            <p className="text-xs text-red-300">Negative pressure spikes / line chatter:</p>
                            <ul className="text-xs text-slate-300 mt-2 list-disc ml-4 space-y-1">
                                <li><strong>Hypovolemia:</strong> Trial 250-500mL fluid bolus.</li>
                                <li><strong>Cannula Position:</strong> Check for kinking or displacement.</li>
                                <li><strong>RPM Too High:</strong> Decrease RPM until chatter stops.</li>
                            </ul>
                        </div>
                    </Card>
                </div>
            );

            const Transfusion = () => (
                <div className="space-y-6">
                    <Card className="p-5">
                        <SectionHeader title="Transfusion Thresholds" iconName="droplets" />
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div className={`p-4 rounded-lg border ${data.hb !== '' && parseFloat(data.hb) < 80 ? 'border-red-500 bg-red-500/10' : 'border-slate-700 bg-slate-900'}`}>
                                <h4 className="font-bold text-xs uppercase mb-1">Red Blood Cells</h4>
                                <p className="text-sm">Threshold: <strong>70-80 g/L</strong></p>
                                {data.hb !== '' && parseFloat(data.hb) < 80 && <p className="text-xs text-red-400 mt-1 font-bold">Action: Transfuse 1 unit RBC</p>}
                            </div>
                            <div className={`p-4 rounded-lg border ${data.plt !== '' && parseFloat(data.plt) < 50 ? 'border-red-500 bg-red-500/10' : 'border-slate-700 bg-slate-900'}`}>
                                <h4 className="font-bold text-xs uppercase mb-1">Platelets</h4>
                                <p className="text-sm">Threshold: <strong>> 50 x 10⁹/L</strong></p>
                                {data.plt !== '' && parseFloat(data.plt) < 50 && <p className="text-xs text-red-400 mt-1 font-bold">Action: Transfuse 1 pool PLT</p>}
                            </div>
                            <div className={`p-4 rounded-lg border ${data.fibrinogen !== '' && parseFloat(data.fibrinogen) < 1.5 ? 'border-red-500 bg-red-500/10' : 'border-slate-700 bg-slate-900'}`}>
                                <h4 className="font-bold text-xs uppercase mb-1">Fibrinogen / Cryo</h4>
                                <p className="text-sm">Threshold: <strong>> 1.5 g/L</strong></p>
                                {data.fibrinogen !== '' && parseFloat(data.fibrinogen) < 1.5 && <p className="text-xs text-red-400 mt-1 font-bold">Action: Give 10 units Cryo</p>}
                            </div>
                            <div className={`p-4 rounded-lg border ${data.inr !== '' && parseFloat(data.inr) > 1.5 ? 'border-red-500 bg-red-500/10' : 'border-slate-700 bg-slate-900'}`}>
                                <h4 className="font-bold text-xs uppercase mb-1">Plasma (FFP)</h4>
                                <p className="text-sm">Threshold: <strong>INR &lt; 1.5</strong></p>
                                {data.inr !== '' && parseFloat(data.inr) > 1.5 && <p className="text-xs text-red-400 mt-1 font-bold">Action: Consider FFP if bleeding</p>}
                            </div>
                        </div>
                    </Card>
                </div>
            );

            const Anticoagulation = () => (
                <div className="space-y-6">
                    <Card className="p-5">
                        <SectionHeader title="Heparin Protocol" iconName="shield" />
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
                            <InputField label="ACT" value={data.act} onChange={(v) => updateData('act', v)} unit="sec" step="1" placeholder="180" />
                            <InputField label="aPTT" value={data.aptt} onChange={(v) => updateData('aptt', v)} unit="sec" step="1" placeholder="45" />
                            <InputField label="Anti-Xa" value={data.antiXa} onChange={(v) => updateData('antiXa', v)} unit="IU/mL" step="0.05" placeholder="0.3" />
                        </div>

                        <div className="bg-slate-900 p-4 rounded-lg border border-slate-700">
                            <h4 className="text-xs font-bold text-blue-400 uppercase mb-3">Dose Adjustment Logic</h4>
                            {data.antiXa === '' ? (
                                <div className="text-slate-500 text-sm italic">Awaiting Anti-Xa input for dosage logic...</div>
                            ) : parseFloat(data.antiXa) < 0.2 ? (
                                <div className="text-red-400 text-sm font-bold animate-pulse">
                                    Sub-therapeutic! Increase infusion by 2 units/kg/hr and check in 4h.
                                </div>
                            ) : parseFloat(data.antiXa) > 0.5 ? (
                                <div className="text-yellow-400 text-sm font-bold">
                                    Over-therapeutic. Reduce infusion by 2 units/kg/hr or hold for 1h.
                                </div>
                            ) : (
                                <div className="text-green-400 text-sm font-bold">
                                    Target Met (0.3 - 0.5 IU/mL). Maintain current dose.
                                </div>
                            )}
                        </div>

                        <div className="mt-4 p-3 bg-blue-900/20 rounded text-[11px] text-slate-400 leading-tight">
                            Note: Anti-Xa is the preferred gold standard for ECMO. aPTT (Target 50-70s) can be influenced by inflammation and factor deficiencies. ACT (Target 160-200s) is used primarily for point-of-care.
                        </div>
                    </Card>
                </div>
            );

            const renderContent = () => {
                let content;
                switch(activeTab) {
                    case 'ECMO': content = Overview(); break;
                    case 'va': content = VAProtocol(); break;
                    case 'vv': content = VVProtocol(); break;
                    case 'gas': content = GasExchange(); break;
                    case 'hemo': content = Hemodynamics(); break;
                    case 'transfusion': content = Transfusion(); break;
                    case 'anticoagulation': content = Anticoagulation(); break;
                    default: content = Overview(); break;
                }
                return (
                    <>
                        {content}
                        <BackToTopButton />
                    </>
                );
            };

            return (
                <div className="flex h-screen overflow-hidden bg-slate-950">
                    <aside className="w-64 bg-slate-900 border-r border-slate-800 flex flex-col hidden lg:flex">
                        <div className="p-6 border-b border-slate-800 flex items-center gap-3">
                            <Icon name="activity" className="text-blue-500 w-8 h-8" />
                            <div>
                                <h1 className="text-lg font-bold text-white leading-none">ECMO-Master</h1>
                                <span className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Clinical Support</span>
                            </div>
                        </div>
                        <nav className="flex-1 p-4 space-y-1 overflow-y-auto">
                            {navItems.map(item => (
                                <button 
                                    key={item.id}
                                    onClick={() => setActiveTab(item.id)}
                                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all ${
                                        activeTab === item.id 
                                        ? 'bg-blue-600 text-white shadow-lg shadow-blue-900/20' 
                                        : 'text-slate-400 hover:bg-slate-800 hover:text-slate-200'
                                    }`}
                                >
                                    <Icon name={item.icon} className="w-4 h-4" />
                                    {item.label}
                                </button>
                            ))}
                        </nav>
                        <div className="p-4 border-t border-slate-800">
                            <div className="flex items-center gap-2 text-[10px] font-bold text-slate-500 uppercase">
                                <span className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                                Mixed Units Enabled
                            </div>
                        </div>
                    </aside>

                    <main ref={mainRef} className="flex-1 overflow-y-auto p-4 md:p-8 scroll-smooth-container relative">
                        <div className="max-w-5xl mx-auto">
                            <div className="lg:hidden flex items-center justify-between mb-6 bg-slate-900 p-4 rounded-xl border border-slate-800">
                                <h2 className="font-bold text-blue-400 uppercase text-xs tracking-widest">{activeTab}</h2>
                                <select 
                                    className="bg-slate-800 text-xs p-1 rounded text-white"
                                    value={activeTab}
                                    onChange={(e) => setActiveTab(e.target.value)}
                                >
                                    {navItems.map(i => <option key={i.id} value={i.id}>{i.label}</option>)}
                                </select>
                            </div>

                            <div className="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
                                <div>
                                    <h2 className="text-3xl font-bold text-white capitalize tracking-tight">
                                        {activeTab.replace('-', ' ')}
                                    </h2>
                                    <p className="text-slate-500 text-sm mt-1">Real-time algorithmic decision support.</p>
                                </div>
                                <div className="flex gap-2">
                                    <button 
                                        onClick={() => updateData('mode', data.mode === 'VA' ? 'VV' : 'VA')}
                                        className="bg-slate-800/50 border border-slate-700 px-4 py-2 rounded-lg text-center hover:bg-slate-700 hover:border-blue-500 transition-all group active:scale-95"
                                    >
                                        <p className="text-[10px] text-slate-500 uppercase font-black group-hover:text-blue-400">Mode (Click to Toggle)</p>
                                        <p className="text-sm font-bold text-blue-400">{data.mode}-ECMO</p>
                                    </button>
                                    <div className="bg-slate-800/50 border border-slate-700 px-4 py-2 rounded-lg text-center">
                                        <p className="text-[10px] text-slate-500 uppercase font-black">Weight</p>
                                        <p className="text-sm font-bold text-white">{data.weight || "--"} kg</p>
                                    </div>
                                </div>
                            </div>

                            <div className="animate-in fade-in slide-in-from-bottom-4 duration-500">
                                {renderContent()}
                            </div>

                            <footer className="mt-12 pt-6 border-t border-slate-800 text-center flex flex-col gap-2">
                                <p className="text-[10px] text-slate-400 font-bold uppercase tracking-wider">
                                    Developer: Spiros Konstas RN, ECMO specialist | 17th of April 2026
                                </p>
                                <p className="text-[10px] text-slate-600 uppercase tracking-[0.2em] px-4">
                                    Medical Disclaimer: For educational purposes only. This program is not meant to replace clinical judgement. Validate all calculations manually before clinical use.
                                </p>
                            </footer>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
